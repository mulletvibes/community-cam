<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityCam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="camera-frame"></div>

  <div id="vote-overlay">
    <div id="site-label">COMMUNITYCAM</div>
    <div id="vote-prompt">Loading…</div>
    <div id="countdown">--:--</div>
  </div>

  <div id="location-overlay">
    <div id="loc-name"></div>
    <div id="loc-time"></div>
    <div id="loc-weather"></div>
  </div>

  <button id="chat-toggle" class="hidden" aria-label="Open chat">CHAT</button>

  <aside id="chat-panel" class="open">
    <div id="chat-header">
      <span>COMMUNITY CHAT</span>
      <button id="chat-close" aria-label="Close chat">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <input type="text" id="chat-input" placeholder="Type your vote..." autocomplete="off">
      <button id="chat-send">GO</button>
    </div>
  </aside>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="cameras.js"></script>
  <script src="app.js"></script>
</body>
</html>
